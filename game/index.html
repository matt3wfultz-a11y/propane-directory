<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BugJar</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── Title / New-Game Panel ─────────────────────────────────────────── -->
  <div id="panel-title" class="panel-overlay">
    <div class="panel-card panel-card--wide">
      <div class="panel-title-logo">
        <div class="title-bugs">🪲 🦋 🦗</div>
        <h1 class="game-title">BugJar</h1>
        <p class="game-subtitle">COLLECT · BATTLE · BREED</p>
      </div>

      <div id="title-name-step">
        <div class="name-form">
          <label for="input-player-name">Your name, Collector:</label>
          <input id="input-player-name" type="text" maxlength="16"
                 placeholder="Enter name…" autocomplete="off" />
          <button id="btn-title-next" class="btn btn-primary btn-large">
            Choose Starter →
          </button>
        </div>
      </div>

      <div id="title-starter-step" class="hidden">
        <p class="starter-hint">Pick your first bug:</p>
        <div id="starter-grid" class="starter-grid"></div>
        <button id="btn-title-confirm" class="btn btn-primary btn-large" disabled>
          Start Adventure
        </button>
      </div>
    </div>
  </div>

  <!-- ── Battle Panel ───────────────────────────────────────────────────── -->
  <div id="panel-battle" class="panel-overlay hidden">
    <div class="panel-card">
      <div class="battle-enemy-info">
        <div class="battle-mon-name" id="battle-enemy-name">—</div>
        <div class="hp-bar-wrap">
          <div class="hp-bar hp-high" id="battle-enemy-hp-bar" style="width:100%"></div>
        </div>
        <div class="hp-text" id="battle-enemy-hp-text">— / —</div>
      </div>

      <div class="battle-arena">
        <span id="battle-enemy-emoji" style="font-size:52px">❓</span>
        <span id="battle-player-emoji" style="font-size:44px">🐛</span>
      </div>

      <div class="battle-player-info">
        <div class="battle-mon-name" id="battle-player-name">—</div>
        <div class="hp-bar-wrap">
          <div class="hp-bar hp-high" id="battle-player-hp-bar" style="width:100%"></div>
        </div>
        <div class="hp-text" id="battle-player-hp-text">— / —</div>
      </div>

      <div class="battle-log" id="battle-log"></div>

      <div class="battle-actions">
        <button id="btn-battle-fight" class="btn btn-primary">⚔ Fight</button>
        <button id="btn-battle-jar"   class="btn btn-secondary" disabled>🫙 Jar</button>
        <button id="btn-battle-run"   class="util-btn util-flee" style="grid-column:span 2">↩ Run</button>
      </div>
    </div>
  </div>

  <!-- ── Roster Panel ───────────────────────────────────────────────────── -->
  <div id="panel-roster" class="panel-overlay hidden">
    <div class="panel-card">
      <div class="panel-card-header">
        <h2>Your Jar 🫙</h2>
        <button id="btn-roster-close" class="btn btn-back">✕</button>
      </div>
      <div id="roster-list" class="monster-grid"></div>
    </div>
  </div>

  <!-- ── Bag FAB (always visible on map) ────────────────────────────────── -->
  <button id="btn-bag" class="bag-fab hidden">🎒 Bag</button>

  <!-- ── Scripts (dependency order) ────────────────────────────────────── -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/species.js"></script>
  <script src="js/genetics.js"></script>
  <script src="js/monster.js"></script>
  <script src="js/moves.js"></script>
  <script src="js/catch.js"></script>
  <script src="js/battle.js"></script>
  <script src="js/state.js"></script>
  <script src="js/ui/panels.js"></script>
  <script src="game.js"></script>

</body>
</html>
